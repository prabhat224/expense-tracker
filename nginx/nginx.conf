# BudgetCo NGINX Reverse Proxy Configuration
# Usage: nginx -c $(pwd)/nginx/nginx.conf

worker_processes auto;

events {
    worker_connections 1024;
    use                epoll;
    multi_accept       on;
}

http {
    # ── Logging ──────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time';

    access_log  /var/log/nginx/budgetco_access.log main;
    error_log   /var/log/nginx/budgetco_error.log warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain application/json application/javascript text/css;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api:10m      rate=30r/m;
    limit_req_zone  $binary_remote_addr zone=auth:10m     rate=10r/m;
    limit_req_zone  $binary_remote_addr zone=graphql:10m  rate=60r/m;

    # ── Upstream: Express API ─────────────────────────────────────────────────
    upstream budgetco_api {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    # ── Upstream: Next.js frontend ────────────────────────────────────────────
    upstream budgetco_frontend {
        server 127.0.0.1:3001;
        keepalive 16;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Main server block
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen       80;
        server_name  localhost budgetco.local;

        # Security headers
        add_header X-Frame-Options          "SAMEORIGIN"   always;
        add_header X-XSS-Protection         "1; mode=block" always;
        add_header X-Content-Type-Options   "nosniff"      always;
        add_header Referrer-Policy          "no-referrer-when-downgrade" always;
        add_header Strict-Transport-Security "max-age=31536000" always;

        # ── Auth endpoints — strict rate limit ────────────────────────────────
        location /api/auth/ {
            limit_req   zone=auth burst=5 nodelay;
            proxy_pass  http://budgetco_api\;
            include     /etc/nginx/proxy_params;
        }

        # ── GraphQL endpoint ──────────────────────────────────────────────────
        location /api/graphql {
            limit_req   zone=graphql burst=20 nodelay;
            proxy_pass  http://budgetco_api\;
            include     /etc/nginx/proxy_params;

            # WebSocket upgrade for GraphQL subscriptions
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── REST API ──────────────────────────────────────────────────────────
        location /api/ {
            limit_req   zone=api burst=10 nodelay;
            proxy_pass  http://budgetco_api\;
            include     /etc/nginx/proxy_params;
        }

        # ── Prometheus metrics (internal only) ────────────────────────────────
        location /metrics {
            allow   127.0.0.1;
            deny    all;
            proxy_pass http://budgetco_api\;
            include    /etc/nginx/proxy_params;
        }

        # ── Swagger docs ──────────────────────────────────────────────────────
        location /docs {
            proxy_pass  http://budgetco_api\;
            include     /etc/nginx/proxy_params;
        }

        # ── Socket.io WebSocket ───────────────────────────────────────────────
        location /socket.io/ {
            proxy_pass          http://budgetco_api\;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host       $host;
            proxy_cache_bypass  $http_upgrade;
        }

        # ── Next.js frontend ──────────────────────────────────────────────────
        location / {
            proxy_pass  http://budgetco_frontend\;
            include     /etc/nginx/proxy_params;

            # Next.js hot reload WebSocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Static file caching ───────────────────────────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
            proxy_pass  http://budgetco_frontend\;
            expires     30d;
            add_header  Cache-Control "public, immutable";
        }
    }
}
