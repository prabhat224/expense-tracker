global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'budgetco_api'
    static_configs:
      - targets: ['host.docker.internal:3000']   # Mac/Windows
    metrics_path: /metrics

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
