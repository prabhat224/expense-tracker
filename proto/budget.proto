syntax = "proto3";

package budget;

// ─── Messages ────────────────────────────────────────────────────────────────

message Budget {
  int32  id          = 1;
  string name        = 2;
  double limit       = 3;
  double spent       = 4;
  string category    = 5;
  string description = 6;
  string created_at  = 7;
}

message Expense {
  int32  id          = 1;
  string description = 2;
  double amount      = 3;
  string category    = 4;
  int32  budget_id   = 5;
  string created_at  = 6;
}

// ─── Request / Response messages ────────────────────────────────────────────

message GetBudgetsRequest {
  int32  owner_id = 1;
  string category = 2;
  int32  limit    = 3;
}

message GetBudgetsResponse {
  repeated Budget budgets = 1;
}

message GetBudgetRequest {
  int32 id       = 1;
  int32 owner_id = 2;
}

message CreateBudgetRequest {
  int32  owner_id    = 1;
  string name        = 2;
  double limit       = 3;
  string category    = 4;
  string description = 5;
}

message DeleteBudgetRequest {
  int32 id       = 1;
  int32 owner_id = 2;
}

message DeleteBudgetResponse {
  bool   success = 1;
  string message = 2;
}

message AddExpenseRequest {
  int32  owner_id    = 1;
  int32  budget_id   = 2;
  string description = 3;
  double amount      = 4;
  string category    = 5;
}

message GetExpensesRequest {
  int32 owner_id  = 1;
  int32 budget_id = 2;
  int32 limit     = 3;
}

message GetExpensesResponse {
  repeated Expense expenses = 1;
}

// ─── Service definition ──────────────────────────────────────────────────────

service BudgetService {
  rpc GetBudgets   (GetBudgetsRequest)  returns (GetBudgetsResponse);
  rpc GetBudget    (GetBudgetRequest)   returns (Budget);
  rpc CreateBudget (CreateBudgetRequest) returns (Budget);
  rpc DeleteBudget (DeleteBudgetRequest) returns (DeleteBudgetResponse);
  rpc AddExpense   (AddExpenseRequest)  returns (Expense);
  rpc GetExpenses  (GetExpensesRequest) returns (GetExpensesResponse);
}
